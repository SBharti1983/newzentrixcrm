name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile and Build Workspace
        run: npx turbo run build

      - name: Run Unit Tests
        run: |
          npx tsx tests/unit/core.test.ts
          npx tsx tests/unit/security.test.ts
          npx tsx tests/unit/messaging.test.ts
          npx tsx tests/unit/observability.test.ts
          npx tsx tests/unit/worker.test.ts
