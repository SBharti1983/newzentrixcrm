# ZentrixCRM Ingress Rate-Limiting & Gateway Configurations
#
# Sets up edge proxy limits, DDoS mitigation, and SSL gateway redirects.

events {
    worker_connections 1024;
}

http {
    # 1. Define Rate-Limiting Zones
    # Limit login routes to 10 requests per minute
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # Limit generic CRM API routes to 10 requests per second
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name api.zentrixcrmindia.com;

        # Redirect HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name api.zentrixcrmindia.com;

        # SSL Configuration certificates
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 2. Global Security Headers (DDoS protection)
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # 3. Route Proxying and Limits Application
        # Auth endpoints rate-limiting boundary
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://zentrixcrm-server:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Generic API endpoints rate-limiting boundary
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://zentrixcrm-server:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
